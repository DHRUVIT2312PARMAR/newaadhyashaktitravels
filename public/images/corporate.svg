<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="corporateGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#64748b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#475569;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#corporateGrad)"/>
  <!-- Building/Office background -->
  <rect x="120" y="60" width="160" height="120" fill="#94a3b8" rx="5"/>
  <rect x="130" y="70" width="50" height="40" fill="#cbd5e1" rx="3"/>
  <rect x="195" y="70" width="50" height="40" fill="#cbd5e1" rx="3"/>
  <!-- Business people -->
  <g transform="translate(60, 100)">
    <!-- Person 1 - Manager -->
    <circle cx="20" cy="20" r="10" fill="#fdbcb4"/>
    <rect x="14" y="32" width="12" height="25" fill="#1e3a8a"/>
    <rect x="14" y="32" width="12" height="12" fill="#1e293b"/>
    <circle cx="18" cy="57" r="3" fill="#1f2937"/>
    <circle cx="22" cy="57" r="3" fill="#1f2937"/>
    <!-- Person 2 - Staff -->
    <circle cx="50" cy="22" r="10" fill="#dbeafe"/>
    <rect x="44" y="34" width="12" height="25" fill="#065f46"/>
    <circle cx="48" cy="59" r="3" fill="#1f2937"/>
    <circle cx="52" cy="59" r="3" fill="#1f2937"/>
    <!-- Person 3 - Employee -->
    <circle cx="80" cy="20" r="10" fill="#fce7f3"/>
    <rect x="74" y="32" width="12" height="25" fill="#7c3aed"/>
    <circle cx="78" cy="57" r="3" fill="#1f2937"/>
    <circle cx="82" cy="57" r="3" fill="#1f2937"/>
    <!-- Person 4 -->
    <circle cx="110" cy="23" r="10" fill="#dcfce7"/>
    <rect x="104" y="35" width="12" height="25" fill="#ea580c"/>
    <circle cx="108" cy="60" r="3" fill="#1f2937"/>
    <circle cx="112" cy="60" r="3" fill="#1f2937"/>
  </g>
  <!-- Emoji in corner -->
  <text x="30" y="50" font-size="50">👔</text>
  <!-- Briefcase icon -->
  <rect x="310" y="80" width="50" height="40" rx="3" fill="#cbd5e1" opacity="0.6"/>
  <rect x="320" y="75" width="30" height="8" fill="#cbd5e1" opacity="0.6"/>
</svg>