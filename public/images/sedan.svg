<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="sedanGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e3a8a;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#sedanGrad)"/>
  <g transform="translate(100, 80)">
    <!-- Car body -->
    <ellipse cx="100" cy="80" rx="80" ry="30" fill="#2563eb"/>
    <rect x="30" y="50" width="140" height="50" rx="15" fill="#3b82f6"/>
    <!-- Wheels -->
    <circle cx="50" cy="100" r="20" fill="#1f2937"/>
    <circle cx="50" cy="100" r="12" fill="#6366f1"/>
    <circle cx="150" cy="100" r="20" fill="#1f2937"/>
    <circle cx="150" cy="100" r="12" fill="#6366f1"/>
    <!-- Windows -->
    <rect x="50" y="55" width="25" height="20" rx="3" fill="#93c5fd" opacity="0.8"/>
    <rect x="105" y="55" width="25" height="20" rx="3" fill="#93c5fd" opacity="0.8"/>
  </g>
  <!-- Emoji car in corner -->
  <text x="320" y="50" font-size="60">🚗</text>
</svg>