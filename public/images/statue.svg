<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="statueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#statueGrad)"/>
  <!-- Sky -->
  <rect width="400" height="120" fill="#a7f3d0" opacity="0.2"/>
  <!-- Pedestal base -->
  <rect x="150" y="180" width="100" height="80" rx="5" fill="#78350f"/>
  <!-- Pedestal details -->
  <rect x="155" y="180" width="90" height="10" fill="#92400e"/>
  <rect x="155" y="210" width="90" height="10" fill="#92400e"/>
  <!-- Monument/Statue tower -->
  <g transform="translate(170, 80)">
    <!-- Main structure -->
    <polygon points="30,0 0,40 60,40" fill="#ca8a04"/>
    <rect x="5" y="40" width="50" height="100" fill="#b45309"/>
    <!-- Top dome -->
    <circle cx="30" cy="20" r="15" fill="#fbbf24"/>
    <!-- Flag pole -->
    <rect x="28" y="-20" width="4" height="25" fill="#92400e"/>
    <!-- Flag -->
    <polygon points="32,-15 32,-5 42,-10" fill="#dc2626"/>
  </g>
  <!-- Emoji statue in corner -->
  <text x="20" y="50" font-size="60">🗿</text>
  <!-- Landscape -->
  <ellipse cx="200" cy="280" rx="180" ry="30" fill="#15803d" opacity="0.4"/>
</svg>