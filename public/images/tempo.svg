<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="tempoGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0e7490;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#tempoGrad)"/>
  <g transform="translate(60, 50)">
    <!-- Large van body -->
    <rect x="10" y="40" width="200" height="90" rx="15" fill="#06b6d4"/>
    <ellipse cx="110" cy="130" rx="110" ry="40" fill="#0891b2"/>
    <!-- Wheels -->
    <circle cx="50" cy="135" r="30" fill="#1f2937"/>
    <circle cx="50" cy="135" r="18" fill="#22d3ee"/>
    <circle cx="170" cy="135" r="30" fill="#1f2937"/>
    <circle cx="170" cy="135" r="18" fill="#22d3ee"/>
    <!-- Windows (multiple) -->
    <rect x="25" y="50" width="30" height="30" rx="3" fill="#cffafe" opacity="0.8"/>
    <rect x="65" y="50" width="30" height="30" rx="3" fill="#cffafe" opacity="0.8"/>
    <rect x="105" y="50" width="30" height="30" rx="3" fill="#cffafe" opacity="0.8"/>
    <rect x="145" y="50" width="30" height="30" rx="3" fill="#cffafe" opacity="0.8"/>
    <!-- Passenger indicators -->
    <circle cx="40" cy="85" r="3" fill="#ffffff" opacity="0.6"/>
    <circle cx="80" cy="85" r="3" fill="#ffffff" opacity="0.6"/>
    <circle cx="120" cy="85" r="3" fill="#ffffff" opacity="0.6"/>
  </g>
  <!-- Emoji car in corner -->
  <text x="300" y="50" font-size="60">🚐</text>
</svg>