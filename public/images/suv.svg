<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="suvGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#059669;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#047857;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#suvGrad)"/>
  <g transform="translate(80, 60)">
    <!-- SUV body (larger, taller) -->
    <rect x="20" y="40" width="160" height="70" rx="20" fill="#10b981"/>
    <ellipse cx="100" cy="110" rx="90" ry="35" fill="#059669"/>
    <!-- Wheels -->
    <circle cx="45" cy="115" r="25" fill="#1f2937"/>
    <circle cx="45" cy="115" r="15" fill="#34d399"/>
    <circle cx="155" cy="115" r="25" fill="#1f2937"/>
    <circle cx="155" cy="115" r="15" fill="#34d399"/>
    <!-- Windows -->
    <rect x="35" y="50" width="30" height="25" rx="3" fill="#a7f3d0" opacity="0.8"/>
    <rect x="95" y="50" width="30" height="25" rx="3" fill="#a7f3d0" opacity="0.8"/>
    <rect x="135" y="50" width="30" height="25" rx="3" fill="#a7f3d0" opacity="0.8"/>
  </g>
  <!-- Emoji car in corner -->
  <text x="310" y="50" font-size="60">🚙</text>
</svg>